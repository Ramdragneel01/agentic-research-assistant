# Generated by GitHub Copilot
name: agentic-research-assistant

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentic-research-assistant-api:${APP_IMAGE_TAG:-latest}
    environment:
      APP_NAME: ${APP_NAME:-agentic-research-assistant}
      APP_VERSION: ${APP_VERSION:-0.2.0}
      APP_ENV: production
      RESEARCH_API_KEY: ${RESEARCH_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-90}
      MAX_QUERY_LENGTH: ${MAX_QUERY_LENGTH:-800}
      DEFAULT_MAX_SOURCES: ${DEFAULT_MAX_SOURCES:-5}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:4175,http://localhost:4175}
      PORT: 8002
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-*}
      ENFORCE_API_KEY_IN_PRODUCTION: ${ENFORCE_API_KEY_IN_PRODUCTION:-true}
      ENABLE_HSTS: ${ENABLE_HSTS:-false}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,frontend}
    expose:
      - "8002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    image: agentic-research-assistant-frontend:${APP_IMAGE_TAG:-latest}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-4175}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - backend
      - edge

  prometheus:
    image: prom/prometheus:v3.1.0
    profiles: ["monitoring"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9092}:9090"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:
    internal: true
  edge:
    internal: false
